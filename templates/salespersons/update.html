{% extends "base.html" %}
{% block title %}Cập nhật nhân viên{% endblock %}
{% block content %}
<div class="card">
    <h1>Cập nhật nhân viên bán hàng</h1>
    <form class="inline-form" method="GET">
        <div class="field">
            <label>Mã nhân viên</label>
            <input type="text" name="sid" value="{{ sid or '' }}">
        </div>
        <button type="submit">Tìm kiếm</button>
    </form>
    {% if salesperson %}
    <form method="POST">
        <input type="hidden" name="sid" value="{{ salesperson[0] }}">
        <label>Tên nhân viên</label>
        <input type="text" name="sname" value="{{ salesperson[1] }}" required>
        <label>Số điện thoại</label>
        <input type="text" name="phone" value="{{ salesperson[2] }}">
        <button type="submit">Cập nhật</button>
    </form>
    {% endif %}
</div>
{% endblock %}
