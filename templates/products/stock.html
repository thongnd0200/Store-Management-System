{% extends "base.html" %}
{% block title %}Kho hàng{% endblock %}
{% block content %}
<div class="card">
    <h1>Kho hàng</h1>
    <table>
        <thead>
            <tr>
                <th>STT</th>
                <th>Mã SP</th>
                <th>Tên sản phẩm</th>
                <th>ĐVT</th>
                <th>Tồn kho</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody>
        {% for p in products %}
            <tr>
                <td>{{ loop.index }}</td>
                <td>{{ p[0] }}</td>
                <td>{{ p[1] }}</td>
                <td>{{ p[2] }}</td>
                <td>{{ p[3] }}</td>
                <td style="white-space: nowrap;">
                    <a href="{{ url_for('product_update', pid=p[0]) }}" style="color: #f39c12; text-decoration: none; margin-right: 8px;">Sửa</a>
                    <form method="POST" action="{{ url_for('product_delete') }}" style="display: inline;" onsubmit="return confirm('Bạn có chắc chắn muốn xóa sản phẩm {{ p[0] }}?');">
                        <input type="hidden" name="pid" value="{{ p[0] }}">
                        <input type="hidden" name="redirect_to" value="{{ url_for('product_stock') }}">
                        <button type="submit" style="background: none; border: none; color: #e74c3c; cursor: pointer; padding: 0; font-size: inherit;">Xóa</button>
                    </form>
                </td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
