{% extends "base.html" %}
{% block title %}Cập nhật khách hàng{% endblock %}
{% block content %}
<div class="card">
    <h1>Cập nhật khách hàng</h1>
    <form class="inline-form" method="GET">
        <div class="field">
            <label>Mã khách hàng</label>
            <input type="text" name="cid" value="{{ cid or '' }}">
        </div>
        <button type="submit">Tìm kiếm</button>
    </form>
    {% if customer %}
    <form method="POST">
        <input type="hidden" name="cid" value="{{ customer[0] }}">
        <label>Tên khách hàng</label>
        <input type="text" name="cname" value="{{ customer[1] }}" required>
        <label>Địa chỉ</label>
        <input type="text" name="address" value="{{ customer[2] }}" required>
        <div class="form-row">
            <div>
                <label>CMND/CCCD</label>
                <input type="text" name="idnumber" value="{{ customer[3] }}">
            </div>
            <div>
                <label>Số điện thoại</label>
                <input type="text" name="phone" value="{{ customer[4] }}">
            </div>
        </div>
        <button type="submit">Cập nhật</button>
    </form>
    {% endif %}
</div>
{% endblock %}
